<!DOCTYPE html>
<html>
<head>
    <title>API Fetch Demo</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <h2>Fetch API Demo</h2>

    <button onclick="fetchData()">Get Users</button>

    <div id="output"></div>

    <script>
        async function fetchData() {
            const output = document.getElementById("output");

            output.innerHTML = "Loading...";

            try {
                let response = await fetch("https://jsonplaceholder.typicode.com/users");
                let data = await response.json();

                output.innerHTML = "";

                data.forEach(user => {
                    let div = document.createElement('div');
                    div.innerHTML = `${user.name} - ${user.email}`;
                    output.appendChild(div);
                });
            } catch (error) {
                output.innerHTML = "Error fetching data";
            }
        }
    </script>

</body>
</html>
